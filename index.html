<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>待办事项</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .app {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 480px;
      height: fit-content;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      padding: 28px 24px 20px;
    }

    .header h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
    .header .subtitle { font-size: 13px; opacity: 0.8; }

    .stats {
      display: flex;
      gap: 16px;
      margin-top: 16px;
    }

    .stat {
      background: rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
    }

    .stat span { font-weight: 700; font-size: 18px; display: block; }

    .input-area {
      padding: 20px 24px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      gap: 10px;
    }

    .input-area input {
      flex: 1;
      border: 2px solid #e8e8e8;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }

    .input-area input:focus { border-color: #667eea; }

    .input-area button {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 22px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .input-area button:hover { opacity: 0.85; }
    .input-area button:active { transform: scale(0.95); }

    .filters {
      display: flex;
      padding: 12px 24px;
      gap: 8px;
      border-bottom: 1px solid #f0f0f0;
    }

    .filter-btn {
      padding: 6px 14px;
      border: none;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      background: #f0f0f0;
      color: #666;
      transition: all 0.2s;
      font-family: inherit;
    }

    .filter-btn.active {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
    }

    .list {
      padding: 12px 24px;
      min-height: 120px;
      max-height: 420px;
      overflow-y: auto;
    }

    .empty {
      text-align: center;
      color: #bbb;
      padding: 40px 0;
      font-size: 15px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #f5f5f5;
      animation: fadeIn 0.25s ease;
    }

    .todo-item:last-child { border-bottom: none; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .todo-check {
      width: 22px; height: 22px;
      border: 2px solid #d0d0d0;
      border-radius: 50%;
      cursor: pointer;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }

    .todo-check:hover { border-color: #667eea; }

    .todo-check.done {
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-color: transparent;
    }

    .todo-check.done::after {
      content: "✓";
      color: #fff;
      font-size: 13px;
      font-weight: 700;
    }

    .todo-text {
      flex: 1;
      font-size: 15px;
      color: #333;
      cursor: pointer;
      word-break: break-word;
      transition: color 0.2s;
    }

    .todo-text.done {
      text-decoration: line-through;
      color: #bbb;
    }

    .todo-edit-input {
      flex: 1;
      border: 2px solid #667eea;
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      color: #333;
    }

    #priority-btn {
      border: none;
      border-radius: 10px;
      padding: 10px 13px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      color: #fff;
      font-family: inherit;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    #priority-btn:hover { opacity: 0.85; }
    #priority-btn:active { transform: scale(0.95); }

    .priority-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      cursor: pointer;
      transition: transform 0.15s;
    }

    .priority-dot:hover { transform: scale(1.4); }

    .todo-delete {
      background: none;
      border: none;
      color: #ddd;
      font-size: 18px;
      cursor: pointer;
      flex-shrink: 0;
      transition: color 0.2s;
      padding: 2px 4px;
    }

    .todo-delete:hover { color: #f56565; }

    .footer {
      padding: 12px 24px;
      border-top: 1px solid #f0f0f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer span { font-size: 13px; color: #aaa; }

    .clear-btn {
      background: none;
      border: none;
      color: #f56565;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.2s;
    }

    .clear-btn:hover { opacity: 0.7; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>我的待办事项</h1>
      <div class="subtitle">保持专注，逐步完成</div>
      <div class="stats">
        <div class="stat"><span id="stat-total">0</span>全部</div>
        <div class="stat"><span id="stat-active">0</span>待完成</div>
        <div class="stat"><span id="stat-done">0</span>已完成</div>
      </div>
    </div>

    <div class="input-area">
      <input id="new-todo" type="text" placeholder="添加新的待办事项..." maxlength="100" />
      <button id="priority-btn" title="点击切换优先级">中</button>
      <button id="add-btn" title="添加">+</button>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">全部</button>
      <button class="filter-btn" data-filter="active">待完成</button>
      <button class="filter-btn" data-filter="done">已完成</button>
    </div>

    <div class="list" id="todo-list"></div>

    <div class="footer">
      <span id="footer-info">暂无事项</span>
      <button class="clear-btn" id="clear-done">清除已完成</button>
    </div>
  </div>

  <script>
    let todos = JSON.parse(localStorage.getItem('todos') || '[]');
    let filter = 'all';

    const PRIORITY_COLORS = { high: '#f56565', medium: '#ed8936', low: '#48bb78' };
    const PRIORITY_LABELS = { high: '高', medium: '中', low: '低' };
    const PRIORITY_CYCLE  = { high: 'medium', medium: 'low', low: 'high' };
    let currentPriority = 'medium';

    function updatePriorityBtn() {
      const btn = document.getElementById('priority-btn');
      btn.textContent = PRIORITY_LABELS[currentPriority];
      btn.style.background = PRIORITY_COLORS[currentPriority];
    }

    function save() {
      localStorage.setItem('todos', JSON.stringify(todos));
    }

    function render() {
      const list = document.getElementById('todo-list');
      const filtered = todos.filter(t =>
        filter === 'all' ? true :
        filter === 'active' ? !t.done :
        t.done
      );

      document.getElementById('stat-total').textContent = todos.length;
      document.getElementById('stat-active').textContent = todos.filter(t => !t.done).length;
      document.getElementById('stat-done').textContent = todos.filter(t => t.done).length;

      const remaining = todos.filter(t => !t.done).length;
      document.getElementById('footer-info').textContent =
        todos.length === 0 ? '暂无事项' : `还剩 ${remaining} 项待完成`;

      if (filtered.length === 0) {
        list.innerHTML = `<div class="empty">${
          filter === 'done' ? '还没有已完成的事项' :
          filter === 'active' ? '太棒了，全部完成！' :
          '点击上方 + 添加第一条待办事项'
        }</div>`;
        return;
      }

      list.innerHTML = filtered.map(t => {
        const p = t.priority || 'medium';
        return `
        <div class="todo-item" data-id="${t.id}">
          <div class="todo-check ${t.done ? 'done' : ''}" onclick="toggle('${t.id}')"></div>
          <div class="priority-dot" style="background:${PRIORITY_COLORS[p]}" onclick="changePriority('${t.id}')" title="${PRIORITY_LABELS[p]}优先级，点击切换"></div>
          <div class="todo-text ${t.done ? 'done' : ''}" onclick="toggle('${t.id}')" ondblclick="startEdit('${t.id}')" title="双击编辑">${escHtml(t.text)}</div>
          <button class="todo-delete" onclick="remove('${t.id}')" title="删除">×</button>
        </div>`;
      }).join('');
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function addTodo() {
      const input = document.getElementById('new-todo');
      const text = input.value.trim();
      if (!text) return;
      todos.unshift({ id: Date.now().toString(), text, done: false, priority: currentPriority });
      input.value = '';
      save();
      render();
    }

    function toggle(id) {
      const t = todos.find(t => t.id === id);
      if (t) { t.done = !t.done; save(); render(); }
    }

    function remove(id) {
      todos = todos.filter(t => t.id !== id);
      save();
      render();
    }

    function changePriority(id) {
      const t = todos.find(t => t.id === id);
      if (!t) return;
      t.priority = PRIORITY_CYCLE[t.priority || 'medium'];
      save();
      render();
    }

    function startEdit(id) {
      const item = document.querySelector(`.todo-item[data-id="${id}"]`);
      const textEl = item.querySelector('.todo-text');
      const t = todos.find(t => t.id === id);
      if (!t || t.done) return;

      const input = document.createElement('input');
      input.className = 'todo-edit-input';
      input.value = t.text;
      textEl.replaceWith(input);
      input.focus();
      input.select();

      function commit() {
        const val = input.value.trim();
        if (val) t.text = val;
        save();
        render();
      }

      input.addEventListener('blur', commit);
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') input.blur();
        if (e.key === 'Escape') { input.value = t.text; input.blur(); }
      });
    }

    document.getElementById('priority-btn').addEventListener('click', () => {
      currentPriority = PRIORITY_CYCLE[currentPriority];
      updatePriorityBtn();
    });

    document.getElementById('add-btn').addEventListener('click', addTodo);
    document.getElementById('new-todo').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        filter = btn.dataset.filter;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
      });
    });

    document.getElementById('clear-done').addEventListener('click', () => {
      todos = todos.filter(t => !t.done);
      save();
      render();
    });

    updatePriorityBtn();
    render();
  </script>
</body>
</html>
